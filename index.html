<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TPF Safety Dashboard</title>
  <style>
    /* ── Reset & base ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #002868 0%, #001a47 100%);
      color: white;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-logo {
      width: 40px; height: 40px;
      background: #BF0A30;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header-title { font-size: 18px; font-weight: 700; letter-spacing: 0.3px; }
    .header-sub   { font-size: 12px; opacity: 0.65; margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    #last-updated { font-size: 12px; opacity: 0.6; }
    #refresh-btn {
      background: #BF0A30;
      color: white;
      border: none;
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.2s;
    }
    #refresh-btn:hover { background: #a00827; }
    #refresh-btn:disabled { background: #666; cursor: default; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main layout ────────────────────────────────────────── */
    main { max-width: 1200px; margin: 0 auto; padding: 24px 20px 40px; }

    /* ── Config banner ──────────────────────────────────────── */
    #config-banner {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 24px;
      font-size: 14px;
      display: none;
    }
    #config-banner strong { color: #856404; }
    #config-banner code {
      background: #f8f4e3;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }

    /* ── Error banner ───────────────────────────────────────── */
    #error-banner {
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #721c24;
      display: none;
    }

    /* ── Stat cards ─────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-left: 4px solid #ccc;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stat-card .stat-icon { font-size: 22px; }
    .stat-card .stat-value {
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      color: #1a1a2e;
    }
    .stat-card .stat-label { font-size: 12px; color: #666; font-weight: 500; }
    .stat-card .stat-recent { font-size: 11px; color: #999; margin-top: 2px; }

    /* ── Tabs ───────────────────────────────────────────────── */
    .tabs-wrapper {
      background: white;
      border-radius: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .tab-bar {
      display: flex;
      overflow-x: auto;
      border-bottom: 2px solid #f0f2f5;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: none;
      padding: 14px 20px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: #888;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .tab-btn:hover { color: #333; }
    .tab-btn.active { color: #002868; border-bottom-color: #002868; }
    .tab-count {
      background: #f0f2f5;
      border-radius: 10px;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 700;
    }
    .tab-btn.active .tab-count { background: #e8ecf7; color: #002868; }

    /* ── Tab panels ─────────────────────────────────────────── */
    .tab-panel { display: none; padding: 0; }
    .tab-panel.active { display: block; }

    /* ── Table ──────────────────────────────────────────────── */
    .table-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px 12px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .table-title { font-size: 15px; font-weight: 700; color: #1a1a2e; }
    .search-box {
      padding: 7px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      width: 220px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-box:focus { border-color: #002868; }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      background: #f8f9fc;
      padding: 10px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      border-bottom: 1px solid #e8eaed;
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid #f0f2f5;
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafbff; }
    tbody td {
      padding: 11px 16px;
      color: #333;
      vertical-align: top;
      max-width: 280px;
    }
    .cell-wrap {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: #aaa;
      font-size: 14px;
    }
    .empty-state .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }

    /* ── Skeleton loader ────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { height: auto; padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
      .header-right { width: 100%; justify-content: space-between; }
      main { padding: 16px 12px 32px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .search-box { width: 100%; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header>
  <div class="header-left">
    <div class="header-logo">🛡️</div>
    <div>
      <div class="header-title">TPF Safety Dashboard</div>
      <div class="header-sub">Texas Pride Fuels · Field Inspection Records</div>
    </div>
  </div>
  <div class="header-right">
    <span id="last-updated">Not yet loaded</span>
    <button id="refresh-btn" onclick="loadData()">
      <span id="refresh-icon">↻</span> Refresh
    </button>
  </div>
</header>

<!-- ── Main ────────────────────────────────────────────────────────────── -->
<main>

  <!-- Config warning -->
  <div id="config-banner">
    <strong>⚙️ Setup required:</strong> Open <code>dashboard/index.html</code> and set
    <code>SCRIPT_URL</code> at the top of the script to your Google Apps Script Web App URL.
  </div>

  <!-- Error banner -->
  <div id="error-banner"></div>

  <!-- Stat cards -->
  <div class="stats-grid" id="stats-grid">
    <!-- Populated by JS -->
  </div>

  <!-- Tabs -->
  <div class="tabs-wrapper">
    <div class="tab-bar" id="tab-bar">
      <!-- Populated by JS -->
    </div>
    <div id="tab-panels">
      <!-- Populated by JS -->
    </div>
  </div>

</main>

<script>
// ─────────────────────────────────────────────────────────────────────────
// CONFIG — paste your Google Apps Script Web App URL here
// ─────────────────────────────────────────────────────────────────────────
const SCRIPT_URL = "YOUR_APPS_SCRIPT_URL_HERE";

// ─────────────────────────────────────────────────────────────────────────
// Tab definitions
// ─────────────────────────────────────────────────────────────────────────
const TABS = [
  {
    key: "padVisits",
    label: "Pad Visits",
    icon: "📋",
    color: "#e8520a",
    statIcon: "📋",
    columns: ["Submitted At","Inspector","Pad Name","Visit Date",
              "Fire Extinguishers (Name | Monthly | Annual)",
              "PPE Issued (Item → Recipient)","H2S Last Bump Test","Notes"]
  },
  {
    key: "trainingRecords",
    label: "Training",
    icon: "🎓",
    color: "#0a5ae8",
    statIcon: "🎓",
    columns: ["Submitted At","Inspector","Training Type","Employee Name",
              "Date Completed","Expiration Date","Cert Card Photo"]
  },
  {
    key: "truckInspections",
    label: "Truck Inspections",
    icon: "🚗",
    color: "#0a8a2f",
    statIcon: "🚗",
    columns: ["Submitted At","Inspector","Vehicle ID","Inspection Date",
              "Cab Binders Acknowledged","Expired / Replaced Items",
              "Registration","Fire Ext Monthly","Fire Ext Annual",
              "Mounting Hardware","Emergency Equipment","Notes"]
  },
  {
    key: "fireExt",
    label: "Fire Extinguishers",
    icon: "🔥",
    color: "#cc0000",
    statIcon: "🔥",
    columns: ["Submitted At","Inspector","Pad / Location","Date",
              "Extinguishers (Name | Monthly | Annual)","Notes"]
  },
  {
    key: "ppeIssued",
    label: "PPE Issued",
    icon: "🦺",
    color: "#7b0ab5",
    statIcon: "🦺",
    columns: ["Submitted At","Inspector","Pad / Location","Date Issued",
              "PPE Issued (Item → Recipient)","Notes"]
  },
  {
    key: "h2sBumpTests",
    label: "H2S Bump Tests",
    icon: "💨",
    color: "#0a8a8a",
    statIcon: "💨",
    columns: ["Submitted At","Inspector","Pad / Location","Bump Test Date","Notes"]
  }
];

// ─────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────
let allData   = {};
let activeTab = 0;

// ─────────────────────────────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  if (SCRIPT_URL === "https://script.google.com/u/0/home/projects/1Ztn0yywsK2y6PMJNF2-BAS9_LhqvqavbPWhxCZZ9Q0cd-mEoxkUakMpT/edit") {
    document.getElementById("config-banner").style.display = "block";
    renderSkeleton();
    return;
  }
  buildShell();
  loadData();
});

// ─────────────────────────────────────────────────────────────────────────
// Build static shell (tabs + panels)
// ─────────────────────────────────────────────────────────────────────────
function buildShell() {
  // Stats grid placeholders
  const sg = document.getElementById("stats-grid");
  sg.innerHTML = TABS.map((t, i) => `
    <div class="stat-card" style="border-left-color:${t.color}">
      <div class="stat-icon">${t.statIcon}</div>
      <div class="stat-value skeleton" id="stat-val-${i}" style="width:50px;height:36px;border-radius:6px"></div>
      <div class="stat-label">${t.label}</div>
      <div class="stat-recent" id="stat-recent-${i}"></div>
    </div>
  `).join("");

  // Tab bar
  const tb = document.getElementById("tab-bar");
  tb.innerHTML = TABS.map((t, i) => `
    <button class="tab-btn ${i===0?"active":""}" onclick="switchTab(${i})" id="tab-btn-${i}">
      ${t.icon} ${t.label}
      <span class="tab-count" id="tab-count-${i}">—</span>
    </button>
  `).join("");

  // Panels
  const tp = document.getElementById("tab-panels");
  tp.innerHTML = TABS.map((t, i) => `
    <div class="tab-panel ${i===0?"active":""}" id="panel-${i}">
      <div class="table-toolbar">
        <div class="table-title">${t.icon} ${t.label}</div>
        <input class="search-box" type="search" placeholder="Search…"
               oninput="filterTable(${i}, this.value)" id="search-${i}" />
      </div>
      <div class="table-wrap">
        <table id="table-${i}">
          <thead><tr>${t.columns.map(c=>`<th>${c}</th>`).join("")}</tr></thead>
          <tbody id="tbody-${i}"><tr><td colspan="${t.columns.length}">
            <div class="empty-state"><div class="empty-icon">⏳</div>Loading…</div>
          </td></tr></tbody>
        </table>
      </div>
    </div>
  `).join("");
}

// ─────────────────────────────────────────────────────────────────────────
// Fetch data via JSONP (works cross-origin from GitHub Pages)
// ─────────────────────────────────────────────────────────────────────────
function loadData() {
  const btn  = document.getElementById("refresh-btn");
  const icon = document.getElementById("refresh-icon");
  btn.disabled = true;
  icon.classList.add("spin");
  hideError();

  const callbackName = "_tpfDashCallback_" + Date.now();
  const script = document.createElement("script");

  window[callbackName] = function(data) {
    delete window[callbackName];
    document.head.removeChild(script);
    btn.disabled = false;
    icon.classList.remove("spin");

    if (data.error) { showError(data.error); return; }

    allData = data;
    document.getElementById("last-updated").textContent =
      "Updated " + (data.fetchedAt || new Date().toLocaleTimeString());

    renderAll();
  };

  script.onerror = function() {
    delete window[callbackName];
    document.head.removeChild(script);
    btn.disabled = false;
    icon.classList.remove("spin");
    showError("Could not reach the Apps Script endpoint. Make sure it is deployed and the URL is correct.");
  };

  script.src = SCRIPT_URL + "?callback=" + callbackName;
  document.head.appendChild(script);
}

// ─────────────────────────────────────────────────────────────────────────
// Render all tabs + stats
// ─────────────────────────────────────────────────────────────────────────
function renderAll() {
  TABS.forEach((t, i) => {
    const rows = allData[t.key] || [];

    // Stat card
    const valEl = document.getElementById("stat-val-" + i);
    valEl.classList.remove("skeleton");
    valEl.style.width = valEl.style.height = "";
    valEl.textContent = rows.length;

    const recentEl = document.getElementById("stat-recent-" + i);
    if (rows.length > 0) {
      const last = rows[rows.length - 1];
      const dateKey = Object.keys(last).find(k =>
        k.toLowerCase().includes("date") || k.toLowerCase().includes("submitted"));
      recentEl.textContent = dateKey ? "Last: " + formatCell(last[dateKey]) : "";
    }

    // Tab count badge
    document.getElementById("tab-count-" + i).textContent = rows.length;

    // Table body
    renderTable(i, rows);
  });
}

function renderTable(i, rows) {
  const tab    = TABS[i];
  const tbody  = document.getElementById("tbody-" + i);

  if (!rows || rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${tab.columns.length}">
      <div class="empty-state">
        <div class="empty-icon">${tab.icon}</div>
        No submissions yet
      </div>
    </td></tr>`;
    return;
  }

  // Most recent first
  const sorted = rows.slice().reverse();

  tbody.innerHTML = sorted.map(row => `
    <tr>
      ${tab.columns.map(col => `
        <td><div class="cell-wrap">${formatCell(row[col] || "")}</div></td>
      `).join("")}
    </tr>
  `).join("");
}

// ─────────────────────────────────────────────────────────────────────────
// Search / filter
// ─────────────────────────────────────────────────────────────────────────
function filterTable(i, query) {
  const rows = (allData[TABS[i].key] || []).slice().reverse();
  if (!query.trim()) { renderTable(i, rows.slice().reverse()); return; }
  const q = query.toLowerCase();
  const filtered = rows.filter(row =>
    Object.values(row).some(v => String(v).toLowerCase().includes(q))
  );
  renderTable(i, filtered.slice().reverse());
}

// ─────────────────────────────────────────────────────────────────────────
// Tab switching
// ─────────────────────────────────────────────────────────────────────────
function switchTab(i) {
  document.getElementById("panel-"   + activeTab).classList.remove("active");
  document.getElementById("tab-btn-" + activeTab).classList.remove("active");
  activeTab = i;
  document.getElementById("panel-"   + i).classList.add("active");
  document.getElementById("tab-btn-" + i).classList.add("active");
}

// ─────────────────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────────────────
function formatCell(val) {
  if (val === null || val === undefined || val === "") return '<span style="color:#ccc">—</span>';
  // Google Sheets returns Date objects serialised as strings; clean them up
  const s = String(val);
  // Linkify Drive URLs
  if (s.startsWith("http")) {
    return `<a href="${s}" target="_blank" style="color:#002868;font-size:12px">View Photo ↗</a>`;
  }
  // Escape HTML
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function renderSkeleton() {
  buildShell();
}

function showError(msg) {
  const el = document.getElementById("error-banner");
  el.style.display = "block";
  el.innerHTML = "<strong>⚠️ Error:</strong> " + msg;
}

function hideError() {
  document.getElementById("error-banner").style.display = "none";
}
</script>
</body>
</html>
